<!doctype html>
<html lang="es" class="h-full bg-slate-900 text-slate-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker - ClickUp Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="h-full flex flex-col font-sans antialiased">
    <header class="flex items-center justify-between px-8 py-4 bg-slate-800 border-b border-slate-700 shadow-md">
      <div class="flex items-center space-x-3">
        <h1 class="text-xl font-bold tracking-tight text-white">Task Tracker</h1>
      </div>

      <div class="flex items-center space-x-3 bg-slate-900/60 p-1.5 rounded-lg border border-slate-700/50">
        <span class="text-xs text-slate-400 px-2 font-medium" id="current-user">Sin Sesión</span>
        <button
          id="auth-user-1"
          class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold px-3 py-1.5 rounded-md transition-colors"
        >
          👤 Entrar como Omar
        </button>
        <button
          id="auth-user-2"
          class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold px-3 py-1.5 rounded-md transition-colors"
        >
          👤 Entrar como Evaluador
        </button>
      </div>

      <button
        id="btn-add-task"
        class="cursor-pointer bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-2 rounded-lg shadow-sm shadow-indigo-600/30 transition-all duration-200 text-sm flex items-center space-x-1"
      >
        <span>+ Nueva Tarea</span>
      </button>
    </header>

    <main class="flex-1 p-6 overflow-x-auto">
      <div class="flex space-x-6 h-full min-w-[900px] items-start">
        <section
          class="flex flex-col w-1/3 max-h-full bg-slate-800/50 rounded-xl border border-slate-700/60 p-4 shadow-sm"
          id="col-pendiente"
        >
          <div class="flex items-center justify-between pb-3 border-b border-slate-700/50 mb-4">
            <div class="flex items-center space-x-2">
              <span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
              <h2 class="font-semibold text-slate-200">Pendiente</h2>
            </div>
            <span id="count-pendiente" class="text-xs font-medium px-2 py-0.5 rounded-md bg-slate-700 text-slate-400">
              0
            </span>
          </div>
          <div class="flex-1 overflow-y-auto space-y-3 min-h-[200px]" id="list-pendiente"></div>
        </section>

        <section
          class="flex flex-col w-1/3 max-h-full bg-slate-800/50 rounded-xl border border-slate-700/60 p-4 shadow-sm"
          id="col-en-curso"
        >
          <div class="flex items-center justify-between pb-3 border-b border-slate-700/50 mb-4">
            <div class="flex items-center space-x-2">
              <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
              <h2 class="font-semibold text-slate-200">En Curso</h2>
            </div>
            <span id="count-en-curso" class="text-xs font-medium px-2 py-0.5 rounded-md bg-slate-700 text-slate-400">
              0
            </span>
          </div>
          <div class="flex-1 overflow-y-auto space-y-3 min-h-[200px]" id="list-en-curso"></div>
        </section>

        <section
          class="flex flex-col w-1/3 max-h-full bg-slate-800/50 rounded-xl border border-slate-700/60 p-4 shadow-sm"
          id="col-completado"
        >
          <div class="flex items-center justify-between pb-3 border-b border-slate-700/50 mb-4">
            <div class="flex items-center space-x-2">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              <h2 class="font-semibold text-slate-200">Completado</h2>
            </div>
            <span id="count-completado" class="text-xs font-medium px-2 py-0.5 rounded-md bg-slate-700 text-slate-400">
              0
            </span>
          </div>
          <div class="flex-1 overflow-y-auto space-y-3 min-h-[200px]" id="list-completado"></div>
        </section>
      </div>
    </main>

    <div
      id="task-modal"
      class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-all duration-200"
    >
      <div
        class="bg-slate-800 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform scale-100 transition-all"
      >
        <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center">
          <h2 id="modal-title" class="text-lg font-bold text-white">Nueva Tarea</h2>
        </div>

        <form id="task-form" class="p-6 space-y-4">
          <input type="hidden" id="task-id" />

          <div>
            <label for="title" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
              Título
            </label>
            <input
              type="text"
              id="title"
              required
              placeholder="Ej: Corregir query de filtrado"
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            />
          </div>

          <div>
            <label for="description" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
              Descripción
            </label>
            <textarea
              id="description"
              rows="3"
              placeholder="Describe los detalles de la tarea..."
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none"
            ></textarea>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="priority" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                Prioridad
              </label>
              <select
                id="priority"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
              >
                <option value="Baja">Baja</option>
                <option value="Media" selected>Media</option>
                <option value="Alta">Alta</option>
              </select>
            </div>
            <div>
              <label for="status" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                Estado
              </label>
              <select
                id="status"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
              >
                <option value="Pendiente">Pendiente</option>
                <option value="En Curso">En Curso</option>
                <option value="Completado">Completado</option>
              </select>
            </div>
          </div>

          <div>
            <label for="assigned_to" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
              Asignar a (ID Usuario)
            </label>
            <input
              type="number"
              id="assigned_to"
              placeholder="Ej: 1"
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            />
          </div>

          <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-700 mt-6">
            <button
              type="button"
              id="btn-close-modal"
              class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium px-4 py-2 rounded-lg text-sm transition-colors"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="cursor-pointer bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-2 rounded-lg text-sm shadow-sm transition-colors"
            >
              Guardar Tarea
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- <script src="js/app.js"></script> -->
    <script src="./js/app.js"></script>
  </body>
</html>
